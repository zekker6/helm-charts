name: "Docs: Check"

on:
  workflow_call:
    inputs:
      checkoutCommit:
        description: "Git ref to check out; empty uses the triggering ref."
        type: string
        required: false
        default: ""

jobs:
  docs-check:
    name: Verify docs are up to date
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ inputs.checkoutCommit || github.ref }}

      - name: Install tools
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4

      - name: Run docs:sync
        run: task docs:sync

      - name: Check for uncommitted changes
        run: |
          if ! git diff --quiet; then
            echo "::error::Docs are out of date. Run 'task docs:sync' and commit the changes."
            git diff --stat
            exit 1
          fi
