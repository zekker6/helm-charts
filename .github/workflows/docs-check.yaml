name: "Docs: Check"

on:
  workflow_call:

jobs:
  docs-check:
    name: Verify docs are up to date
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4

      - name: Run docs:sync
        run: task docs:sync

      - name: Check for uncommitted changes
        run: |
          if ! git diff --quiet; then
            echo "::error::Docs are out of date. Run 'task docs:sync' and commit the changes."
            git diff --stat
            exit 1
          fi
