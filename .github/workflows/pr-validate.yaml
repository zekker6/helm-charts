name: "Pull Request: Validate"

on:
  pull_request:
    branches:
      - main
      - development
    types:
      - opened
      - edited
      - reopened
      - ready_for_review
      - synchronize

concurrency:
  group: ${{ github.head_ref }}-pr-validate
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pr-metadata:
    uses: ./.github/workflows/pr-metadata.yaml

  renovate-bump:
    name: Auto-bump chart version
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    # Author identity gates the write token; branch name and commit author are forgeable.
    if: >-
      github.event.pull_request.user.login == 'renovate[bot]' &&
      github.event.pull_request.user.type == 'Bot' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.head_ref, 'renovate/')
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install tools
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4

      - name: Bump version and sync docs
        env:
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail

          git fetch --no-tags origin "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}"

          mapfile -t changed < <(git diff --name-only "origin/${BASE_REF}...HEAD")
          echo "Changed files: ${changed[*]}"

          # Skip cleanly when Renovate touched no app chart (e.g. a GitHub Actions
          # or library-chart bump). There is no app-chart version to bump.
          if ! printf '%s\n' "${changed[@]}" | grep -qE '^charts/apps/[^/]+/'; then
            echo "No app chart files changed; nothing to bump"
            exit 0
          fi

          chart_file=$(printf '%s\n' "${changed[@]}" | grep -E '^charts/apps/[^/]+/Chart\.yaml$' | head -1 || true)
          values_file=$(printf '%s\n' "${changed[@]}" | grep -E '^charts/apps/[^/]+/values\.yaml$' | head -1 || true)
          if [[ -z "$chart_file" || -z "$values_file" ]]; then
            echo "::error::Renovate auto-bump only supports changes to exactly one app chart's Chart.yaml and values.yaml"
            exit 1
          fi

          chart_dir=${chart_file%/Chart.yaml}
          if [[ "$values_file" != "$chart_dir/values.yaml" ]]; then
            echo "::error::Chart.yaml and values.yaml are not in the same app chart"
            exit 1
          fi

          chart_name=${chart_dir##*/}

          # Files a proper bump produces: Renovate's Chart.yaml + values.yaml, plus
          # the README.md and docs/charts copy synced by `task charts:bump`.
          allowed=(
            "$chart_file"
            "$values_file"
            "$chart_dir/README.md"
            "docs/charts/${chart_name}.md"
          )
          for f in "${changed[@]}"; do
            if ! printf '%s\n' "${allowed[@]}" | grep -qxF -- "$f"; then
              echo "::error::Unexpected file changed for Renovate auto-bump: $f"
              exit 1
            fi
          done

          base_version=$(git show "origin/${BASE_REF}:$chart_file" | yq -r '.version')
          pr_version=$(yq -r '.version' "$chart_file")

          # Re-run after a successful bump: version already changed and only the
          # expected files differ, so the bump is complete. Pass instead of failing.
          if [[ "$pr_version" != "$base_version" ]]; then
            echo "Chart version already bumped (PR=$pr_version, base=$base_version); nothing to do"
            exit 0
          fi

          # Before the bump only Renovate's two files should differ.
          if [[ "${#changed[@]}" -ne 2 ]]; then
            echo "::error::Expected only Chart.yaml + values.yaml before bumping, got ${#changed[@]}: ${changed[*]}"
            exit 1
          fi

          subject=$(git log -1 --format=%s)
          description=${subject#*: }

          task charts:bump CHART_FILE="$chart_file" DESCRIPTION="$description"

          if git diff --quiet; then
            echo "No changes produced; nothing to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: bump chart version"
          git push origin "HEAD:refs/heads/${HEAD_REF}"

  pre-commit-check:
    uses: ./.github/workflows/pre-commit-check.yaml
    needs:
      - pr-metadata
    with:
      modifiedFiles: ${{ needs.pr-metadata.outputs.addedOrModifiedFiles }}

  docs-check:
    uses: ./.github/workflows/docs-check.yaml
    needs:
      - pr-metadata
      - renovate-bump
    # Skipped renovate-bump (non-Renovate PRs) must not skip validation.
    if: ${{ !cancelled() && needs.pr-metadata.result == 'success' && needs.renovate-bump.result != 'failure' }}
    with:
      checkoutCommit: ${{ needs.pr-metadata.outputs.isTrustedRenovatePR == 'true' && github.head_ref || github.sha }}

  charts-lint:
    uses: ./.github/workflows/charts-lint.yaml
    needs:
      - pr-metadata
      - renovate-bump
    if: ${{ !cancelled() && needs.pr-metadata.result == 'success' && needs.renovate-bump.result != 'failure' }}
    with:
      checkoutCommit: ${{ needs.pr-metadata.outputs.isTrustedRenovatePR == 'true' && github.head_ref || github.sha }}
      chartsToLint: ${{ needs.pr-metadata.outputs.chartsToLint }}
      isRenovatePR: ${{ needs.pr-metadata.outputs.isTrustedRenovatePR }}

  charts-test:
    uses: ./.github/workflows/charts-test.yaml
    needs:
      - pr-metadata
      - renovate-bump
    if: ${{ !cancelled() && needs.pr-metadata.result == 'success' && needs.renovate-bump.result != 'failure' }}
    with:
      checkoutCommit: ${{ needs.pr-metadata.outputs.isTrustedRenovatePR == 'true' && github.head_ref || github.sha }}
      chartsToTest: |-
        ${{
           needs.pr-metadata.outputs.chartsToInstall
         }}
