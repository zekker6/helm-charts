name: "Charts: Release to GitHub pages"

on:
  workflow_call:
    inputs:
      charts_dir:
        description: >
          Dir to release charts from. Defaults to "charts/apps".
        default: "charts/apps"
        required: false
        type: string

concurrency:
  group: gh-pages
  cancel-in-progress: false

env:
  HELM_VERSION: 3.19.4

permissions:
  contents: write
  pages: write
  deployments: write

jobs:
  release-charts:
    name: Release charts
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout charts branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install Kubernetes tools
        uses: yokawasa/action-setup-kube-tools@b16d49b2c459d33cf9d4c300a220ef0bcdbc730a # v0.14.0
        with:
          setup-tools: |
            helmv3
          helm: "${{ env.HELM_VERSION }}"

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Release charts
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          charts_dir: "${{ inputs.charts_dir }}"
          skip_existing: true
